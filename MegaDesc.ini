# MegaDesc 配置文件
# 修改后需重启游戏生效

[Logging]
# 是否禁止记录日志。
# 0 = 不禁止，正常生成日志并保留最近 30 个（默认）
# 1 = 禁止，不生成日志，也不扫描/清理旧日志
DisableLog=0

[Images]
# 背景 PCX 文件名；文件放在插件目录的 pcx 子目录中。
# BackgroundPcx 只写文件名，不需要写 pcx\ 目录或完整路径。
# 背景图由插件直接读取，不走 HoMM3 原版资源系统，因此不受 12 字节资源名限制。
# 当前配置字段使用 2K 堆缓冲。
# 例如：bv_bgA.pcx
# 修改后重启游戏生效。
BackgroundPcx=bv_bgB.pcx

[Layout]
# 窗口与元素布局参数，调整后重启游戏生效
# 坐标系：原点(0,0)在窗口左上角，x向右增，y向下增
# 背景图高度需要与 WindowHeight 一致
WindowHeight=487          # 窗口高度（原版311）
Shift=13                  # 除名称外元素整体下移量（原版0）
DescY=248                 # 描述文字框 Y 坐标（原版232）
TextHeight=207            # 描述文本区高度（原版85）
TextWidth=200             # 描述文本区宽度（原版200）
DescXOffset=5             # 描述文字水平偏移（正值右移，原版0，默认5）
BtnMarginBottom=40        # 确认按钮距窗口底部偏移（原版40）
DismissBtnMarginBottom=90 # 解雇按钮距窗口底部偏移（原版40，位于确认上方）
SpellBtnMarginBottom=132   # 魔法书/施法按钮距窗口底部偏移（原版40，位于解雇上方）
InfoBarMarginBottom=26    # 详细信息栏距窗口底部偏移（原版26）
